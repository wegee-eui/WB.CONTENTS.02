<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 편지 만들기 - 글씨만 반전 저장</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Baskerville', 'Libre Baskerville', 'Noto Serif KR', serif;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }

        .letter-workspace {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1; 
            min-height: 0; 
            padding: 15px;
            box-sizing: border-box;
        }

        #letter-container {
            position: relative;
            height: 100vh; 
            aspect-ratio: 10 / 18.5; 
            background-color: white;
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden; 
        }

        #bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #letter-text {
            position: absolute;
            top: 8%;
            left: 10%;
            width: 80%;
            height: 84%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 14px; 
            font-weight: bold; 
            line-height: 1.8;
            color: #ffffff; 
            mix-blend-mode: exclusion; 
            z-index: 2;
            overflow: hidden;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #letter-text:empty:before {
            content: "여기에 편지 내용을 작성하세요...";
            color: rgb(255, 255, 255); 
            font-style: italic;
        }

        .controls {
            width: 100%;
            max-width: 250px; 
            margin-top: 20px;
            display: flex; 
            gap: 10px; 
        }

        .custom-btn {
            flex: 1; 
            padding: 12px 0;
            text-align: center;
            background-color: #161616;
            color: white;
            border: none;
            border-radius: 0px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            box-sizing: border-box;
            transition: background-color 0.2s;
            font-family: 'Baskerville', 'Libre Baskerville', 'Noto Serif KR', serif;
        }
        .custom-btn:hover { background-color: #ff0000; }

        .template-selector {
            width: 100%;
            background-color: white;
            padding: 20px 0; 
            display: flex;
            justify-content: center; 
            align-items: center;
            border-top: 1px solid #ddd;
            flex-shrink: 0; 
            
            perspective: 1000px; 
            overflow: hidden; 
            cursor: grab;
            touch-action: none; 
        }
        
        .template-selector:active {
            cursor: grabbing;
        }

        .carousel {
            width: 50px; 
            height: 92.5px; 
            position: relative;
            transform-style: preserve-3d; 
        }

        .template-btn {
            position: absolute;
            top: 0;
            left: 0;
            width: 50px;
            height: 92.5px; 
            object-fit: cover;
            border: 2px solid transparent;
            border-radius: 0px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15); 
            -webkit-user-drag: none; 
            transition: border-color 0.3s;
        }

        .template-btn.active { 
            border-color: #ff0000; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.4); 
        }
    </style>
</head>
<body>

    <div class="letter-workspace">
        <div id="letter-container">
            <img id="bg-image" src="" alt="배경 이미지" style="display: none;">
            <div id="letter-text" contenteditable="true" spellcheck="false"></div>
        </div>

        <div class="controls">
            <button id="save-btn" class="custom-btn">❤︎ 편지 저장하기 ❤︎</button>
            <button id="share-btn" class="custom-btn">❤︎ 편지 공유하기 ❤︎</button>
        </div>
    </div>

    <div class="template-selector" id="drag-container">
        <div class="carousel" id="carousel">
            <img src="bg1.jpg" class="template-btn" alt="디자인 1">
            <img src="bg2.jpg" class="template-btn" alt="디자인 2">
            <img src="bg3.jpg" class="template-btn" alt="디자인 3">
            <img src="bg4.jpg" class="template-btn" alt="디자인 4">
            <img src="bg5.jpg" class="template-btn" alt="디자인 5">
            <img src="bg6.jpg" class="template-btn" alt="디자인 6">
            <img src="bg7.jpg" class="template-btn" alt="디자인 7">
            <img src="bg8.jpg" class="template-btn" alt="디자인 8">
            <img src="bg9.jpg" class="template-btn" alt="디자인 9">
            <img src="bg10.jpg" class="template-btn" alt="디자인 10">
            <img src="bg11.jpg" class="template-btn" alt="디자인 11">
        </div>
    </div>

    <script>
        const bgImage = document.getElementById('bg-image');
        const saveBtn = document.getElementById('save-btn');
        const shareBtn = document.getElementById('share-btn'); 
        const letterContainer = document.getElementById('letter-container');
        const letterText = document.getElementById('letter-text');
        
        // 3D 회전 캐러셀 설정 
        const carousel = document.getElementById('carousel');
        const templateBtns = document.querySelectorAll('.template-btn');
        const dragContainer = document.getElementById('drag-container');
        
        const cellCount = templateBtns.length; 
        const theta = 360 / cellCount; 
        const cellWidth = 50; 
        const radius = Math.round((cellWidth / 2) / Math.tan(Math.PI / cellCount)) + 25; 

        templateBtns.forEach((btn, index) => {
            btn.style.transform = `rotateY(${index * theta}deg) translateZ(${radius}px)`;
        });

        let currentRotation = 0;
        let dragRotation = 0;
        let isDragging = false;
        let startX = 0;
        let currentX = 0;

        function activateCenterItem() {
            const snapIndex = Math.round(currentRotation / theta);
            currentRotation = snapIndex * theta;
            carousel.style.transform = `translateZ(${-radius}px) rotateY(${currentRotation}deg)`;

            let activeIndex = Math.round(-currentRotation / theta) % cellCount;
            if (activeIndex < 0) activeIndex += cellCount; 

            const activeBtn = templateBtns[activeIndex];
            bgImage.src = activeBtn.src;
            bgImage.style.display = 'block';

            templateBtns.forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        carousel.style.transform = `translateZ(${-radius}px) rotateY(0deg)`;
        activateCenterItem(); 

        dragContainer.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX;
            currentX = e.clientX;
            dragRotation = currentRotation;
            carousel.style.transition = 'none'; 
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            currentX = e.clientX;
            const dx = currentX - startX;
            currentRotation = dragRotation + dx * 0.4; 
            carousel.style.transform = `translateZ(${-radius}px) rotateY(${currentRotation}deg)`;
        });

        window.addEventListener('pointerup', () => {
            if (!isDragging) return;
            isDragging = false;
            carousel.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)'; 
            activateCenterItem(); 
        });

        templateBtns.forEach((btn, index) => {
            btn.addEventListener('click', (e) => {
                if (Math.abs(currentX - startX) > 5) {
                    e.preventDefault();
                    return;
                }
                currentRotation = -index * theta;
                carousel.style.transition = 'transform 0.5s ease-out';
                activateCenterItem();
            });
        });

        // =========================================================
        // 핵심 버그 수정: 글씨에만 완벽하게 제외 효과를 입히는 합성 로직
        // =========================================================
        async function createExclusionCanvas() {
            // 1단계: 텍스트를 숨기고 '배경 이미지'만 온전히 캡처합니다.
            letterText.style.display = 'none';
            const bgCanvas = await html2canvas(letterContainer, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            letterText.style.display = 'block';

            // 2단계: 배경 이미지를 숨깁니다.
            const originalBgDisplay = bgImage.style.display;
            bgImage.style.display = 'none';
            
            // !!! 아주 중요한 수정 부분 !!!
            // 컨테이너가 가지고 있던 하얀색 배경과 테두리를 완전히 투명하게 없애버립니다.
            // 그래야 캡처본에 하얀 덩어리가 잡히지 않고 순수하게 글씨만 남습니다.
            const originalContainerBg = letterContainer.style.backgroundColor;
            const originalContainerBorder = letterContainer.style.border;
            letterContainer.style.backgroundColor = 'transparent';
            letterContainer.style.border = 'none';
            
            // 글씨의 제외 효과도 잠시 꺼서 하얀 글씨 그대로 캡처되게 합니다.
            letterText.style.mixBlendMode = 'normal';
            
            // 완벽히 투명한 바탕(backgroundColor: null) 위에 텍스트만 캡처합니다.
            const textCanvas = await html2canvas(letterContainer, { scale: 2, useCORS: true, backgroundColor: null });
            
            // 숨겨뒀던 배경색, 테두리, 효과를 모두 원래대로 복구합니다.
            bgImage.style.display = originalBgDisplay;
            letterContainer.style.backgroundColor = originalContainerBg;
            letterContainer.style.border = originalContainerBorder;
            letterText.style.mixBlendMode = 'exclusion';

            // 3단계: 새 캔버스를 만들어서 배경과 텍스트(투명 바탕)를 '제외' 모드로 합성합니다.
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = bgCanvas.width;
            finalCanvas.height = bgCanvas.height;
            const ctx = finalCanvas.getContext('2d');

            // 바닥에 온전한 배경 깔기
            ctx.drawImage(bgCanvas, 0, 0);
            
            // 붓(Brush)의 합성 모드를 '제외(Exclusion)'로 설정
            ctx.globalCompositeOperation = 'exclusion';
            
            // 그 위에 투명하게 따낸 텍스트 도장 찍기
            // 이제 투명한 부분은 무시되고 오직 '글씨' 영역에만 반전 효과가 들어갑니다!
            ctx.drawImage(textCanvas, 0, 0);

            return finalCanvas;
        }
        // =========================================================

        // 저장 기능 실행
        saveBtn.addEventListener('click', async function() {
            letterText.blur();
            try {
                const finalCanvas = await createExclusionCanvas(); 
                
                const link = document.createElement('a');
                link.download = 'my_custom_letter.png';
                link.href = finalCanvas.toDataURL('image/png');
                link.click();
            } catch (error) {
                alert("저장 중 오류가 발생했습니다.");
                console.error(error);
            }
        });

        // 공유 기능 실행
        shareBtn.addEventListener('click', async function() {
            letterText.blur();
            try {
                const finalCanvas = await createExclusionCanvas(); 

                finalCanvas.toBlob(async (blob) => {
                    if (!blob) return alert("이미지 생성에 실패했습니다.");

                    const file = new File([blob], 'my_custom_letter.png', { type: 'image/png' });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: '내가 쓴 편지',
                                text: '편지가 도착했습니다!' 
                            });
                        } catch (error) {
                            console.log('공유 취소/오류', error);
                        }
                    } else {
                        alert('현재 브라우저에서는 이미지 직접 공유 기능을 지원하지 않습니다. 저장하기를 이용해 주세요.');
                    }
                }, 'image/png');

            } catch (error) {
                alert("공유를 위한 이미지 처리 중 오류가 발생했습니다.");
                console.error(error);
            }
        });
    </script>
</body>
</html>
